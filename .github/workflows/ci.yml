name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  flutter:
    name: Flutter analyze and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed lib/student/meniu.dart test/widget_test.dart
      - run: flutter analyze --no-fatal-warnings --no-fatal-infos
      - run: flutter test

  functions:
    name: Cloud Functions checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm audit --omit=dev --audit-level=high

  firestore-rules:
    name: Firestore rules compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npx --yes firebase-tools@latest emulators:exec --project demo-aegis --only firestore "true"
